name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/web

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: os7_platform
          POSTGRES_PASSWORD: password
          POSTGRES_USER: os7
        options: >-
          --health-cmd "pg_isready -U os7 -d os7_platform"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npm run prisma:validate
        env:
          DATABASE_URL: postgresql://os7:password@localhost:5432/os7_platform

      - name: Generate Prisma client
        run: npm run prisma:generate
        env:
          DATABASE_URL: postgresql://os7:password@localhost:5432/os7_platform

      - name: Apply database migrations
        run: npm run db:deploy
        env:
          DATABASE_URL: postgresql://os7:password@localhost:5432/os7_platform

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Worker build
        run: npm run worker:build

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://os7:password@localhost:5432/os7_platform
          AUTH_SECRET: ci-auth-secret
          APP_READY_BASE_URL: http://traefik
          FORGEJO_ADMIN_PASSWORD: ci-forgejo-password
          FORGEJO_ADMIN_USER: root
          FORGEJO_GIT_URL: http://forgejo
          FORGEJO_URL: http://forgejo
          MANAGER_URL: http://manager
          PLATFORM_BASE_URL: http://os7.localhost
          PLATFORM_DOMAIN: localhost
          PROJECT_DEV_AGENT_MODEL: openai/gpt-5
          PROJECT_PUBLIC_SCHEME: http
          PROJECT_USE_AGENT_MODEL: x-ai/grok-4.3
          OAUTH_INTERNAL_BASE_URL: http://localhost:3000
          REDIS_URL: redis://localhost:6379
          USER_AGENT_MODEL: openai/gpt-5

  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: |
            DATABASE_URL=postgresql://os7:password@localhost:5432/os7_platform
            AUTH_SECRET=ci-auth-secret
            APP_READY_BASE_URL=http://traefik
            FORGEJO_ADMIN_PASSWORD=ci-forgejo-password
            FORGEJO_ADMIN_USER=root
            FORGEJO_GIT_URL=http://forgejo
            FORGEJO_URL=http://forgejo
            MANAGER_URL=http://manager
            OAUTH_INTERNAL_BASE_URL=http://localhost:3000
            PLATFORM_BASE_URL=http://os7.localhost
            PLATFORM_DOMAIN=localhost
            PROJECT_DEV_AGENT_MODEL=openai/gpt-5
            PROJECT_PUBLIC_SCHEME=http
            PROJECT_USE_AGENT_MODEL=x-ai/grok-4.3
            REDIS_URL=redis://localhost:6379
            USER_AGENT_MODEL=openai/gpt-5
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
